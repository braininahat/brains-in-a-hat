<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brains-in-a-hat | Agent Dashboard</title>
<style>
/* ------------------------------------------------------------------ */
/* Reset & Variables                                                   */
/* ------------------------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg:        #0d1117;
    --bg-card:   #161b22;
    --bg-hover:  #1c2129;
    --border:    #30363d;
    --text:      #e6edf3;
    --text-dim:  #8b949e;
    --text-mute: #484f58;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --yellow:    #d29922;
    --red:       #f85149;
    --purple:    #bc8cff;
    --orange:    #f0883e;
    --cyan:      #39d2c0;
    --radius:    6px;
    --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono:      "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
}

body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
}

/* ------------------------------------------------------------------ */
/* Layout                                                              */
/* ------------------------------------------------------------------ */
.app {
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 1fr 400px;
    height: 100vh;
    gap: 0;
}

header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
}

header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
}

header h1 span {
    color: var(--text-dim);
    font-weight: 400;
}

.status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
}

.status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
}

.status-dot.connected    { background: var(--green); }
.status-dot.disconnected { background: var(--red); }
.status-dot.connecting   { background: var(--yellow); animation: pulse 1s ease-in-out infinite; }

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
}

.main-area {
    overflow-y: auto;
    padding: 16px 20px;
}

.sidebar {
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ------------------------------------------------------------------ */
/* Agent Cards Grid                                                    */
/* ------------------------------------------------------------------ */
.section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    margin-bottom: 12px;
}

.agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
}

.agent-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
}

.agent-card:hover {
    background: var(--bg-hover);
}

.agent-card.active {
    border-color: var(--green);
}

.agent-card.active::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: var(--green);
}

.agent-card.done {
    border-color: var(--accent);
}

.agent-card.done::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
}

.agent-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
}

.agent-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
}

.agent-badge {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--bg);
}

.agent-badge.idle   { color: var(--text-mute); }
.agent-badge.active { color: var(--green); background: #3fb95018; }
.agent-badge.done   { color: var(--accent); background: #58a6ff18; }

.agent-action {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}

.agent-files {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-mute);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ------------------------------------------------------------------ */
/* Messages Panel (inter-agent communication)                          */
/* ------------------------------------------------------------------ */
.messages-section {
    margin-bottom: 28px;
}

.messages-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.message-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
}

.message-arrow {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
}

.message-arrow .arrow {
    color: var(--text-mute);
    font-size: 14px;
}

.message-body {
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.5;
    min-width: 0;
    word-break: break-word;
}

.message-time {
    font-size: 11px;
    color: var(--text-mute);
    margin-left: auto;
    flex-shrink: 0;
    font-family: var(--mono);
}

/* ------------------------------------------------------------------ */
/* Sidebar: Activity Timeline                                          */
/* ------------------------------------------------------------------ */
.sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
}

.event-count {
    font-size: 11px;
    color: var(--text-mute);
    font-family: var(--mono);
}

.timeline {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
}

.timeline-event {
    display: flex;
    align-items: flex-start;
    padding: 6px 16px;
    gap: 10px;
    font-size: 12px;
    transition: background 0.1s;
}

.timeline-event:hover {
    background: var(--bg-hover);
}

.timeline-event.new-event {
    animation: flash 0.6s ease-out;
}

@keyframes flash {
    0%   { background: #58a6ff20; }
    100% { background: transparent; }
}

.event-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mute);
    flex-shrink: 0;
    width: 52px;
    text-align: right;
    padding-top: 1px;
}

.event-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
}

.event-content {
    min-width: 0;
    flex: 1;
}

.event-agent {
    font-weight: 600;
    font-size: 12px;
}

.event-type {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-mute);
    margin-left: 6px;
}

.event-detail {
    color: var(--text-dim);
    font-size: 12px;
    word-break: break-word;
}

/* ------------------------------------------------------------------ */
/* Empty state                                                         */
/* ------------------------------------------------------------------ */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
}

.empty-state h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-dim);
}

.empty-state p {
    font-size: 13px;
    color: var(--text-mute);
    max-width: 340px;
    line-height: 1.6;
}

.empty-state code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg-card);
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
}

/* ------------------------------------------------------------------ */
/* Scrollbar                                                           */
/* ------------------------------------------------------------------ */
::-webkit-scrollbar       { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-mute); }

/* ------------------------------------------------------------------ */
/* Responsive                                                          */
/* ------------------------------------------------------------------ */
@media (max-width: 900px) {
    .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr 300px;
    }
    .sidebar {
        border-left: none;
        border-top: 1px solid var(--border);
    }
}
</style>
</head>
<body>

<div class="app">
    <header>
        <h1>brains-in-a-hat <span>| agent dashboard</span></h1>
        <div class="status-bar">
            <span id="agent-count">0 agents</span>
            <span id="event-count">0 events</span>
            <span id="connection-status">
                <span class="status-dot connecting" id="status-dot"></span>
                <span id="status-text">connecting</span>
            </span>
        </div>
    </header>

    <div class="main-area" id="main-area">
        <div class="section-title">Agents</div>
        <div class="agents-grid" id="agents-grid"></div>

        <div class="messages-section" id="messages-section" style="display:none">
            <div class="section-title">Inter-Agent Messages</div>
            <div class="messages-list" id="messages-list"></div>
        </div>

        <div class="empty-state" id="empty-state">
            <h3>Waiting for agent activity</h3>
            <p>
                Events will appear here when agents start reporting.
                Agents write to <code>.claude/team/activity.jsonl</code>
            </p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Activity Timeline</h2>
            <span class="event-count" id="timeline-count">0</span>
        </div>
        <div class="timeline" id="timeline"></div>
    </div>
</div>

<script>
/* ================================================================== */
/* Dashboard Client                                                    */
/* ================================================================== */
(function() {
    "use strict";

    // ---- State ----
    var agents = {};          // id -> {id, name, description, status, action, files, color}
    var allEvents = [];       // all activity events in order
    var messages = [];        // inter-agent message events
    var sseRetryMs = 1000;
    var sseMaxRetryMs = 30000;
    var eventSource = null;
    var autoScroll = true;

    // ---- Agent color palette ----
    // 23 distinct, accessible-on-dark colors
    var COLORS = [
        "#58a6ff", "#3fb950", "#d29922", "#f85149", "#bc8cff",
        "#f0883e", "#39d2c0", "#db61a2", "#79c0ff", "#7ee787",
        "#e3b341", "#ff7b72", "#d2a8ff", "#ffa657", "#56d4dd",
        "#ff9bce", "#a5d6ff", "#aff5b4", "#f8e3a1", "#ffc1c0",
        "#cabeff", "#ffd8b5", "#b1ecee"
    ];
    var colorIndex = 0;
    var agentColors = {};

    function getAgentColor(agentId) {
        if (!agentColors[agentId]) {
            agentColors[agentId] = COLORS[colorIndex % COLORS.length];
            colorIndex++;
        }
        return agentColors[agentId];
    }

    // ---- DOM refs ----
    var $agentsGrid     = document.getElementById("agents-grid");
    var $messagesList   = document.getElementById("messages-list");
    var $messagesSection = document.getElementById("messages-section");
    var $timeline       = document.getElementById("timeline");
    var $emptyState     = document.getElementById("empty-state");
    var $agentCount     = document.getElementById("agent-count");
    var $eventCount     = document.getElementById("event-count");
    var $timelineCount  = document.getElementById("timeline-count");
    var $statusDot      = document.getElementById("status-dot");
    var $statusText     = document.getElementById("status-text");

    // ---- Utility ----
    function esc(str) {
        var div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }

    function formatTime(ts) {
        // ts is ISO string, show HH:MM:SS
        if (!ts) return "";
        try {
            var d = new Date(ts);
            if (isNaN(d.getTime())) return ts;
            return d.toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
        } catch(e) {
            return ts;
        }
    }

    function shortTime(ts) {
        if (!ts) return "";
        try {
            var d = new Date(ts);
            if (isNaN(d.getTime())) return "";
            return d.toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit"});
        } catch(e) {
            return "";
        }
    }

    // ---- Agent card rendering ----
    function ensureAgent(agentId) {
        if (agents[agentId]) return;
        agents[agentId] = {
            id: agentId,
            name: agentId,
            description: "",
            status: "idle",
            action: "",
            files: [],
            color: getAgentColor(agentId)
        };
    }

    function renderAgentCards() {
        var ids = Object.keys(agents).sort(function(a, b) {
            // Active first, then done, then idle
            var order = {active: 0, done: 1, idle: 2};
            var diff = (order[agents[a].status] || 2) - (order[agents[b].status] || 2);
            if (diff !== 0) return diff;
            return a.localeCompare(b);
        });

        var html = "";
        for (var i = 0; i < ids.length; i++) {
            var a = agents[ids[i]];
            html += '<div class="agent-card ' + esc(a.status) + '" data-agent="' + esc(a.id) + '">';
            html += '  <div class="agent-header">';
            html += '    <span class="agent-name" style="color:' + a.color + '">' + esc(a.name) + '</span>';
            html += '    <span class="agent-badge ' + esc(a.status) + '">' + esc(a.status) + '</span>';
            html += '  </div>';
            if (a.action) {
                html += '  <div class="agent-action">' + esc(a.action) + '</div>';
            }
            if (a.files.length > 0) {
                html += '  <div class="agent-files">' + esc(a.files.slice(-3).join(", ")) + '</div>';
            }
            html += '</div>';
        }
        $agentsGrid.innerHTML = html;
        $agentCount.textContent = ids.length + " agent" + (ids.length !== 1 ? "s" : "");
    }

    // ---- Timeline rendering ----
    function addTimelineEvent(ev, animate) {
        var el = document.createElement("div");
        el.className = "timeline-event" + (animate ? " new-event" : "");

        var agentId = ev.agent || "unknown";
        var color = getAgentColor(agentId);

        el.innerHTML =
            '<span class="event-time">' + esc(shortTime(ev.ts)) + '</span>' +
            '<span class="event-dot" style="background:' + color + '"></span>' +
            '<div class="event-content">' +
                '<span class="event-agent" style="color:' + color + '">' + esc(agentId) + '</span>' +
                '<span class="event-type">' + esc(ev.event || "") + '</span>' +
                (ev.detail ? '<div class="event-detail">' + esc(ev.detail) + '</div>' : '') +
            '</div>';

        $timeline.appendChild(el);

        // Auto-scroll if user is near the bottom
        if (autoScroll) {
            $timeline.scrollTop = $timeline.scrollHeight;
        }
    }

    function renderTimeline() {
        $timeline.innerHTML = "";
        for (var i = 0; i < allEvents.length; i++) {
            addTimelineEvent(allEvents[i], false);
        }
        if (autoScroll) {
            $timeline.scrollTop = $timeline.scrollHeight;
        }
    }

    // Track scroll position for auto-scroll
    $timeline.addEventListener("scroll", function() {
        var el = $timeline;
        autoScroll = (el.scrollHeight - el.scrollTop - el.clientHeight) < 40;
    });

    // ---- Message rendering ----
    function parseMessage(detail) {
        // Format: "target: message body" or just plain text
        if (!detail) return null;
        var colonIdx = detail.indexOf(":");
        if (colonIdx > 0 && colonIdx < 30) {
            return {
                target: detail.substring(0, colonIdx).trim(),
                body: detail.substring(colonIdx + 1).trim()
            };
        }
        return { target: "", body: detail };
    }

    function renderMessages() {
        if (messages.length === 0) {
            $messagesSection.style.display = "none";
            return;
        }
        $messagesSection.style.display = "";

        // Show last 20 messages
        var recent = messages.slice(-20);
        var html = "";
        for (var i = 0; i < recent.length; i++) {
            var ev = recent[i];
            var parsed = parseMessage(ev.detail);
            if (!parsed) continue;

            var senderColor = getAgentColor(ev.agent);
            var targetColor = parsed.target ? getAgentColor(parsed.target) : "var(--text-mute)";

            html += '<div class="message-item">';
            html += '  <div class="message-arrow">';
            html += '    <span style="color:' + senderColor + '">' + esc(ev.agent) + '</span>';
            if (parsed.target) {
                html += '    <span class="arrow">&rarr;</span>';
                html += '    <span style="color:' + targetColor + '">' + esc(parsed.target) + '</span>';
            }
            html += '  </div>';
            html += '  <div class="message-body">' + esc(parsed.body) + '</div>';
            html += '  <span class="message-time">' + esc(shortTime(ev.ts)) + '</span>';
            html += '</div>';
        }
        $messagesList.innerHTML = html;
    }

    // ---- Update counts ----
    function updateCounts() {
        $eventCount.textContent = allEvents.length + " event" + (allEvents.length !== 1 ? "s" : "");
        $timelineCount.textContent = allEvents.length;
        $emptyState.style.display = allEvents.length > 0 ? "none" : "";
    }

    // ---- Process a single event ----
    function processEvent(ev, animate) {
        allEvents.push(ev);

        var agentId = ev.agent || "unknown";
        ensureAgent(agentId);
        var agent = agents[agentId];

        switch (ev.event) {
            case "start":
                agent.status = "active";
                agent.action = ev.detail || "started";
                agent.files = [];
                break;
            case "done":
                agent.status = "done";
                agent.action = ev.detail || "finished";
                break;
            case "read":
            case "write":
            case "edit":
                agent.status = "active";
                agent.action = ev.event + ": " + (ev.detail || "");
                if (ev.detail) {
                    // Deduplicate files
                    var file = ev.detail.split(":")[0].trim();
                    if (agent.files.indexOf(file) === -1) {
                        agent.files.push(file);
                    }
                }
                break;
            case "message":
                agent.status = "active";
                agent.action = "messaging: " + (ev.detail || "");
                messages.push(ev);
                break;
            default:
                if (agent.status !== "done") {
                    agent.status = "active";
                }
                agent.action = (ev.event || "") + ": " + (ev.detail || "");
                break;
        }

        if (animate) {
            addTimelineEvent(ev, true);
        }

        updateCounts();
    }

    // ---- Connection status ----
    function setConnectionStatus(state) {
        $statusDot.className = "status-dot " + state;
        $statusText.textContent = state;
    }

    // ---- Load initial data ----
    function loadInitialData() {
        // Fetch agents and activity in parallel
        var agentsFetched = false;
        var activityFetched = false;

        fetch("/api/agents")
            .then(function(r) { return r.json(); })
            .then(function(data) {
                for (var i = 0; i < data.length; i++) {
                    var a = data[i];
                    ensureAgent(a.id);
                    agents[a.id].name = a.name;
                    agents[a.id].description = a.description;
                }
                agentsFetched = true;
                if (activityFetched) finishInit();
            })
            .catch(function(err) {
                console.error("Failed to load agents:", err);
                agentsFetched = true;
                if (activityFetched) finishInit();
            });

        fetch("/api/activity")
            .then(function(r) { return r.json(); })
            .then(function(data) {
                for (var i = 0; i < data.length; i++) {
                    processEvent(data[i], false);
                }
                activityFetched = true;
                if (agentsFetched) finishInit();
            })
            .catch(function(err) {
                console.error("Failed to load activity:", err);
                activityFetched = true;
                if (agentsFetched) finishInit();
            });

        function finishInit() {
            renderAgentCards();
            renderTimeline();
            renderMessages();
            updateCounts();
            connectSSE();
        }
    }

    // ---- SSE connection with auto-reconnect ----
    function connectSSE() {
        if (eventSource) {
            eventSource.close();
        }

        setConnectionStatus("connecting");
        eventSource = new EventSource("/events");

        eventSource.onopen = function() {
            setConnectionStatus("connected");
            sseRetryMs = 1000;
        };

        eventSource.onmessage = function(e) {
            try {
                var ev = JSON.parse(e.data);
                processEvent(ev, true);
                renderAgentCards();
                renderMessages();
            } catch(err) {
                console.error("Failed to parse SSE event:", err, e.data);
            }
        };

        eventSource.onerror = function() {
            setConnectionStatus("disconnected");
            eventSource.close();
            eventSource = null;

            // Exponential backoff reconnect
            setTimeout(function() {
                connectSSE();
            }, sseRetryMs);

            sseRetryMs = Math.min(sseRetryMs * 2, sseMaxRetryMs);
        };
    }

    // ---- Boot ----
    loadInitialData();

})();
</script>
</body>
</html>
